version: 0.2

phases:
  install:
    commands:
      - dnf install -y libatomic
      - curl -fsSL https://get.pnpm.io/install.sh | sh -
      - source ~/.bashrc
      - cd javascript
      - pnpm approve-builds @parcel/watcher better-sqlite3 core-js core-js msgpackr-extract node-sass ttag-cli
      - pnpm install
  build:
    commands:
      - (cd javascript && pnpm extract-messages && pnpm build)

artifacts:
  files: '**/*'
